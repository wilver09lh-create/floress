<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girasoles</title>
    <style>
        /* Estilos generales y fondo nocturno */
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0A2A; /* Azul noche profundo */
            overflow: hidden; /* Evita barras de desplazamiento */
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
        }

        /* El lienzo donde se dibujará el ramo */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 2. Contenedor del mensaje AJUSTADO PARA MÓVILES */
        .mensaje {
            position: absolute;
            top: 8%; /* Espacio desde arriba */
            z-index: 2;
            text-align: center;
            width: 90%; /* Ancho del 90% para dejar márgenes */
            max-width: 600px; /* Ancho máximo para no verse tan ancho en PC */
            pointer-events: none;
            left: 50%;
            transform: translateX(-50%); /* Centrado perfecto horizontal */
        }

        /* Estilo base de la letra (PC y tablets grandes) */
        h1 {
            font-style: italic;
            color: #FFD700; /* Amarillo Oro */
            text-shadow: 0 0 15px #FFFF00, 0 0 5px #DAA520; /* Resplandor amarillo/oro */
            margin: 0;
            padding: 0;
            
            /* Tamaño predeterminado para PC */
            font-size: 2.5rem; 
            line-height: 1.2; /* Interlineado cómodo */
        }

        /* --- 3. NUEVA SECCIÓN: MEDIA QUERY PARA AJUSTAR EN CELULARES --- */
        /* Si la pantalla es menor a 600px de ancho... */
        @media (max-width: 600px) {
            h1 {
                /* Reducimos el tamaño del texto para que quepa bien en el celular */
                font-size: 1.6rem; 
                line-height: 1.3; /* Un poco más de espacio entre líneas si el texto se corta */
            }
            .mensaje {
                top: 10%; /* Bajamos un poquito más el mensaje en móviles */
            }
        }
    </style>
</head>
<body>

    <div class="mensaje">
        <h1>Un pequeño detalle para alegrarte el día 🌼</h1>
    </div>

    <canvas id="lienzoRamo"></canvas>

    <script>
        // --- AQUÍ VA EL MISMO CÓDIGO JAVASCRIPT DE LOS GIRASOLES ---
        // (No lo pego completo aquí para no hacer este mensaje eterno,
        // pero asegúrate de usar todo el script que dibuja el ramo de girasoles
        // que te envié en el mensaje anterior dentro de esta etiqueta <script>)

        const canvas = document.getElementById('lienzoRamo');
        const ctx = canvas.getContext('2d');

        // Ajustar el canvas al tamaño de la pantalla
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const centroX = canvas.width / 2;
        const baseRamoY = canvas.height * 0.8;

        function dibujarEscenario() {
            ctx.fillStyle = "white";
            for(let i = 0; i < 150; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = "#FFFACD";
            ctx.beginPath();
            ctx.arc(canvas.width * 0.8, canvas.height * 0.2, 50, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#FFFACD";
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function dibujarFlorPequena(x, y, tamano) {
            ctx.fillStyle = "white";
            for(let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(x, y - tamano, tamano/2, tamano, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.translate(x, y);
                ctx.rotate((Math.PI * 2) / 5);
                ctx.translate(-x, -y);
            }
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(x, y, tamano/1.5, 0, Math.PI*2);
            ctx.fill();
        }

        function dibujarGirasol(x, y, rotacion, escala) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotacion);
            ctx.scale(escala, escala);
            ctx.strokeStyle = "#1E5F33";
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(20, 100, 0, 300);
            ctx.stroke();
            ctx.fillStyle = "#2E8B57";
            ctx.beginPath();
            ctx.ellipse(-30, 150, 15, 60, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(30, 200, 15, 60, -Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();
            const numPetalos = 24;
            const radioCentro = 40;
            const largoPetalo = 90;
            const anchoPetalo = 20;
            ctx.fillStyle = "#FFA500";
            ctx.strokeStyle = "#DAA520";
            ctx.lineWidth = 1;
            for (let i = 0; i < numPetalos; i++) {
                ctx.save();
                ctx.rotate((i * Math.PI * 2) / numPetalos);
                ctx.beginPath();
                ctx.ellipse(0, -radioCentro - largoPetalo / 2, anchoPetalo / 2, largoPetalo / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
            ctx.fillStyle = "#FFD700";
            ctx.strokeStyle = "#FFFF00";
            for (let i = 0; i < numPetalos; i++) {
                ctx.save();
                ctx.rotate(((i + 0.5) * Math.PI * 2) / numPetalos);
                ctx.beginPath();
                ctx.ellipse(0, -radioCentro - (largoPetalo * 0.9) / 2, (anchoPetalo * 0.9) / 2, (largoPetalo * 0.9) / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
            ctx.fillStyle = "#4B3621";
            ctx.beginPath();
            ctx.arc(0, 0, radioCentro, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#2F1B0A";
            for (let i = 0; i < 50; i++) {
                const r = Math.random() * (radioCentro - 5);
                const a = Math.random() * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        dibujarEscenario();
        dibujarFlorPequena(canvas.width * 0.15, canvas.height * 0.85, 12);
        dibujarFlorPequena(canvas.width * 0.85, canvas.height * 0.9, 15);
        dibujarFlorPequena(canvas.width * 0.3, canvas.height * 0.95, 10);
        dibujarFlorPequena(canvas.width * 0.75, canvas.height * 0.8, 18);
        dibujarFlorPequena(canvas.width * 0.5, canvas.height * 0.98, 14);

        const girasolesInfo = [
            { x: centroX - 120, y: baseRamoY - 120, rot: -0.2, esc: 0.7 },
            { x: centroX - 50, y: baseRamoY - 180, rot: -0.1, esc: 0.8 },
            { x: centroX + 50, y: baseRamoY - 190, rot: 0.1, esc: 0.85 },
            { x: centroX + 130, y: baseRamoY - 140, rot: 0.25, esc: 0.75 },
            { x: centroX - 70, y: baseRamoY - 60, rot: -0.15, esc: 0.7 },
            { x: centroX + 70, y: baseRamoY - 70, rot: 0.15, esc: 0.75 },
            { x: centroX, y: baseRamoY, rot: 0, esc: 0.9 }
        ];

        let girasolesDibujados = 0;
        const totalGirasoles = girasolesInfo.length;

        function animarRamo() {
            if (girasolesDibujados < totalGirasoles) {
                const info = girasolesInfo[girasolesDibujados];
                dibujarGirasol(info.x, info.y, info.rot, info.esc);
                girasolesDibujados++;
                setTimeout(animarRamo, 800);
            } else {
                ctx.strokeStyle = "#DAA520";
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(centroX - 40, baseRamoY + 120);
                ctx.bezierCurveTo(centroX - 60, baseRamoY + 150, centroX + 60, baseRamoY + 150, centroX + 40, baseRamoY + 120);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(centroX, baseRamoY + 135, 18, 0, Math.PI * 2);
                ctx.fillStyle = "#DAA520";
                ctx.fill();
                return; 
            }
        }

        setTimeout(animarRamo, 1000);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
